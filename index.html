<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>جدول الحصص المتقدم - حفظ تلقائي وحذف</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tajawal', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f9f1e7 0%, #f4e5d7 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 250, 240, 0.85);
            backdrop-filter: blur(3px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            padding: 1.2rem 1.8rem 2rem;
            transition: all 0.2s;
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(120deg, #9b5e2c, #c47a44);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border-right: 5px solid #e2a76f;
            padding-right: 20px;
        }

        .sub {
            color: #9b7b5c;
            margin-bottom: 1.8rem;
            padding-right: 26px;
            font-weight: 500;
        }

        /* التبويبات */
        .tabs-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 28px;
            border-bottom: 2px solid rgba(194, 139, 79, 0.3);
            padding-bottom: 6px;
        }

        .tab-btn {
            background: #fff7ef;
            border: none;
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            color: #9b5e2c;
            transition: 0.2s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }

        .tab-btn.active {
            background: #e2a76f;
            color: white;
            box-shadow: 0 8px 18px rgba(226, 167, 111, 0.4);
        }

        .tab-btn:hover:not(.active) {
            background: #ffe1c4;
            transform: translateY(-2px);
        }

        .tab-pane {
            display: none;
            animation: fadeSlide 0.25s ease-out;
        }

        .tab-pane.active {
            display: block;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* بطاقة الإضافة */
        .add-card {
            background: #ffffffdb;
            border-radius: 28px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
            border: 1px solid #f7e5d4;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 1.2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 150px;
            flex: 1;
        }

        .input-group label {
            font-weight: 700;
            font-size: 0.8rem;
            color: #b26b39;
        }

        .input-group input, .input-group select {
            padding: 10px 14px;
            border-radius: 40px;
            border: 1.5px solid #eedbcb;
            background: #fffef8;
            font-size: 0.9rem;
            transition: 0.2s;
            outline: none;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: #e2a76f;
            box-shadow: 0 0 0 3px rgba(226, 167, 111, 0.2);
        }

        .btn-primary {
            background: #c47a44;
            border: none;
            padding: 10px 22px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }

        .btn-primary:hover {
            background: #9b5e2c;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(155, 94, 44, 0.25);
        }

        .btn-danger {
            background: #d48c6c;
        }
        .btn-danger:hover {
            background: #bc6f4b;
        }

        /* الجدول */
        .table-container {
            background: white;
            border-radius: 28px;
            overflow-x: auto;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.05);
            border: 1px solid #f7e1ce;
            margin-top: 10px;
        }

        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .schedule-table th {
            background: #faf0e6;
            padding: 14px 12px;
            color: #a5612e;
            font-weight: 800;
            border-bottom: 2px solid #f0dbc9;
        }

        .schedule-table td {
            padding: 12px 10px;
            border-bottom: 1px solid #f5e8dd;
            vertical-align: top;
        }

        .lesson-badge {
            background: #fef3e8;
            border-radius: 60px;
            padding: 6px 14px;
            margin: 5px 8px 5px 0;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            font-size: 0.8rem;
            border-right: 3px solid #e2a76f;
        }

        .delete-lesson-btn, .delete-teacher-btn {
            background: #f0cfbc;
            border: none;
            border-radius: 60px;
            padding: 3px 12px;
            font-size: 0.7rem;
            cursor: pointer;
            font-weight: bold;
            transition: 0.1s;
        }
        .delete-lesson-btn:hover, .delete-teacher-btn:hover {
            background: #d98f6c;
            color: white;
        }

        .teacher-item {
            background: #faf0e6;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px 4px 8px;
            border-radius: 50px;
            margin: 4px 6px 4px 0;
        }

        /* منطقة البحث */
        .search-card {
            background: #fff3e8;
            border-radius: 2rem;
            padding: 1.6rem;
            margin-bottom: 2rem;
            border: 1px solid #f7dbbc;
        }
        .result-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 5px 12px rgba(0,0,0,0.05);
        }
        .result-table th {
            background: #e2a76f;
            color: white;
            padding: 12px;
        }
        .result-table td {
            padding: 10px;
            border-bottom: 1px solid #f0dbca;
        }
        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.75rem;
            color: #bc8f64;
        }
    </style>
</head>
<body>
<div class="dashboard">
    <h1>📚 جدول الحصص الذكي | حفظ تلقائي</h1>
    <div class="sub">✨ إدارة المعلمين والحصص · حذف فوري · بحث متقدم</div>

    <div class="tabs-wrapper" id="dayTabs">
        <button class="tab-btn active" data-day="الأحد">🌞 الأحد</button>
        <button class="tab-btn" data-day="الإثنين">📖 الإثنين</button>
        <button class="tab-btn" data-day="الثلاثاء">🔥 الثلاثاء</button>
        <button class="tab-btn" data-day="الأربعاء">💧 الأربعاء</button>
        <button class="tab-btn" data-day="الخميس">🍃 الخميس</button>
        <button class="tab-btn" data-day="search">🔍 البحث</button>
    </div>

    <div id="panesContainer"></div>
    <footer>📌 جميع التعديلات تُحفظ تلقائياً · حذف المعلم يؤدي لحذف جميع حصصه</footer>
</div>

<script>
    // ---------- الأيام الثابتة ----------
    const daysList = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس"];
    const classOptions = ["أول١", "أول٢", "ثاني١", "ثاني٢", "ثالث١", "ثالث٢", "ثالث٣"];
    const lessonOptions = ["الأولى", "الثانية", "الثالثة", "الرابعة", "الخامسة", "السادسة", "السابعة"];
    
    // هيكل البيانات الرئيسي
    let dayTeachers = {};    // { "الأحد": ["خالد","منى"] }
    let daySchedule = {};    // { "الأحد": [lesson0=[], lesson1=[] ...] }
    
    // تحميل من localStorage
    function loadFromStorage() {
        const stored = localStorage.getItem("smartScheduleData");
        if (stored) {
            try {
                const data = JSON.parse(stored);
                if (data.dayTeachers) dayTeachers = data.dayTeachers;
                if (data.daySchedule) daySchedule = data.daySchedule;
            } catch(e) {}
        }
        // التأكد من وجود كل الأيام
        daysList.forEach(day => {
            if (!dayTeachers[day]) dayTeachers[day] = [];
            if (!daySchedule[day]) daySchedule[day] = Array(7).fill().map(() => []);
        });
    }
    
    // حفظ تلقائي
    function saveToStorage() {
        const toStore = {
            dayTeachers: dayTeachers,
            daySchedule: daySchedule
        };
        localStorage.setItem("smartScheduleData", JSON.stringify(toStore));
    }
    
    // تهيئة الهيكل لأي يوم
    function ensureDayStructure(day) {
        if (!dayTeachers[day]) dayTeachers[day] = [];
        if (!daySchedule[day]) daySchedule[day] = Array(7).fill().map(() => []);
    }
    
    // إضافة معلم
    function addTeacherToDay(day, teacherName) {
        if (!teacherName.trim()) return false;
        if (!dayTeachers[day].includes(teacherName)) {
            dayTeachers[day].push(teacherName);
            saveToStorage();
            return true;
        }
        return false;
    }
    
    // حذف معلم + حذف جميع حصصه
    function deleteTeacherCompletely(day, teacherName) {
        if (!dayTeachers[day]) return false;
        dayTeachers[day] = dayTeachers[day].filter(t => t !== teacherName);
        // حذف كل الحصص التي تحمل هذا المعلم
        for (let i = 0; i < 7; i++) {
            if (daySchedule[day] && daySchedule[day][i]) {
                daySchedule[day][i] = daySchedule[day][i].filter(entry => entry.teacherName !== teacherName);
            }
        }
        saveToStorage();
        return true;
    }
    
    // حذف حصة مفردة
    function deleteSingleLesson(day, lessonIndex, entryIndex) {
        if (daySchedule[day] && daySchedule[day][lessonIndex]) {
            daySchedule[day][lessonIndex].splice(entryIndex, 1);
            saveToStorage();
            return true;
        }
        return false;
    }
    
    // إضافة حصة جديدة
    function addLessonToDay(day, teacherName, className, lessonIndex) {
        ensureDayStructure(day);
        if (!dayTeachers[day].includes(teacherName)) {
            dayTeachers[day].push(teacherName);
        }
        daySchedule[day][lessonIndex].push({ teacherName, className });
        saveToStorage();
        return true;
    }
    
    // عرض تبويب اليوم
    function generateDayContent(day) {
        ensureDayStructure(day);
        const scheduleData = daySchedule[day];
        // بناء الجدول مع أزرار حذف لكل حصة
        let tableRows = "";
        for (let i = 0; i < lessonOptions.length; i++) {
            const lessonName = lessonOptions[i];
            const entries = scheduleData[i] || [];
            let cellContent = "";
            if (entries.length === 0) {
                cellContent = `<span class="empty-lesson" style="color:#c79a6e;">— لا توجد حصص —</span>`;
            } else {
                entries.forEach((entry, idx) => {
                    cellContent += `<div class="lesson-badge">
                                        🧑‍🏫 ${escapeHtml(entry.teacherName)} &nbsp;| 🏫 ${escapeHtml(entry.className)}
                                        <button class="delete-lesson-btn" data-day="${day}" data-lessonidx="${i}" data-entryidx="${idx}">🗑 حذف</button>
                                    </div>`;
                });
            }
            tableRows += `<tr>
                            <td style="font-weight:700; background:#fef6ef; width:110px;">${lessonName}</td>
                            <td>${cellContent}</td>
                          </tr>`;
        }
        
        // قائمة المعلمين + زر حذف بجانب كل معلم
        const teachersList = dayTeachers[day] || [];
        let teachersHtml = `<div style="margin: 12px 0 6px 0; display:flex; flex-wrap:wrap; gap:8px;">`;
        teachersList.forEach(teacher => {
            teachersHtml += `<span class="teacher-item">
                                🧑‍🏫 ${escapeHtml(teacher)}
                                <button class="delete-teacher-btn" data-day="${day}" data-teacher="${escapeHtml(teacher)}" style="background:#f0cfbc; border:none; border-radius:30px; padding:2px 12px;">✖ حذف</button>
                            </span>`;
        });
        teachersHtml += `</div>`;
        
        // قوائم الإضافة
        const teacherSelectOptions = `<option value="">-- اختر المعلم --</option>` + teachersList.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');
        const classSelectOptions = classOptions.map(c => `<option value="${c}">${c}</option>`).join('');
        const lessonSelectOptions = lessonOptions.map(ls => `<option value="${ls}">الحصة ${ls}</option>`).join('');
        
        return `
            <div class="add-card">
                <div class="input-group">
                    <label>👨‍🏫 إضافة معلم جديد (${day})</label>
                    <input type="text" id="teacherNameInput-${day}" placeholder="مثال: خالد العلوي">
                    <button class="btn-primary add-teacher-btn" data-day="${day}">➕ إضافة المعلم</button>
                </div>
                <div class="input-group">
                    <label>📚 إضافة حصة (المعلم + الصف + الحصة)</label>
                    <select id="teacherSelect-${day}">${teacherSelectOptions}</select>
                    <select id="classSelect-${day}">${classSelectOptions}</select>
                    <select id="lessonSelect-${day}">${lessonSelectOptions}</select>
                    <button class="btn-primary add-lesson-btn" data-day="${day}">📌 إضافة الحصة</button>
                </div>
            </div>
            <div class="table-container">
                <table class="schedule-table">
                    <thead><tr><th>الحصة</th><th>المعلمون والفصول (اضغط حذف بجانب أي حصة)</th></tr></thead>
                    <tbody>${tableRows}</tbody>
                </table>
            </div>
            <div style="margin-top: 12px; background:#fff6ed; border-radius: 30px; padding: 10px 18px;">
                <strong>📋 قائمة المعلمين (${day}) :</strong> ${teachersHtml || "<span style='color:#a5764e;'>لا يوجد معلمون بعد</span>"}
            </div>
        `;
    }
    
    // تبويب البحث – عرض نتائج بجدول أنيق
    function generateSearchContent() {
        const dayOptions = daysList.map(d => `<option value="${d}">${d}</option>`).join('');
        const lessonSearchOptions = lessonOptions.map(ls => `<option value="${ls}">الحصة ${ls}</option>`).join('');
        return `
            <div class="search-card">
                <div style="display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end;">
                    <div class="input-group">
                        <label>📅 اختر اليوم</label>
                        <select id="searchDaySelect">${dayOptions}</select>
                    </div>
                    <div class="input-group">
                        <label>⏰ اختر الحصة</label>
                        <select id="searchLessonSelect">${lessonSearchOptions}</select>
                    </div>
                    <button id="performSearchBtn" class="btn-primary" style="background:#bc6f4b;">🔍 بحث</button>
                </div>
            </div>
            <div id="searchResultArea" style="background:white; border-radius:28px; padding:1rem; min-height:200px;">
                <div style="color:#b47c51;">✨ سيظهر هنا جدول يحتوي على المعلمين والصفوف حسب اليوم والحصة.</div>
            </div>
        `;
    }
    
    // تحديث تبويب اليوم بعد أي تعديل
    function refreshDayPane(day) {
        const pane = document.getElementById(`pane-${day}`);
        if (pane) {
            pane.innerHTML = generateDayContent(day);
            attachDayEvents(day);
        }
    }
    
    // ربط أحداث الحذف والإضافة داخل تبويب اليوم
    function attachDayEvents(day) {
        // إضافة معلم
        const addTeacherBtn = document.querySelector(`#pane-${day} .add-teacher-btn`);
        if (addTeacherBtn) {
            addTeacherBtn.addEventListener('click', () => {
                const inputField = document.getElementById(`teacherNameInput-${day}`);
                const teacherName = inputField.value.trim();
                if (!teacherName) return alert("أدخل اسم المعلم");
                if (addTeacherToDay(day, teacherName)) {
                    alert(`✅ تم إضافة "${teacherName}" ليوم ${day}`);
                    inputField.value = '';
                    refreshDayPane(day);
                } else alert("المعلم موجود بالفعل في هذا اليوم");
            });
        }
        // إضافة حصة
        const addLessonBtn = document.querySelector(`#pane-${day} .add-lesson-btn`);
        if (addLessonBtn) {
            addLessonBtn.addEventListener('click', () => {
                const teacherSelect = document.getElementById(`teacherSelect-${day}`);
                const teacherName = teacherSelect.value;
                const classSelect = document.getElementById(`classSelect-${day}`);
                const className = classSelect.value;
                const lessonSelect = document.getElementById(`lessonSelect-${day}`);
                const lessonName = lessonSelect.value;
                if (!teacherName) return alert("اختر معلماً أولاً (أضف معلم إن لم يوجد)");
                if (!className) return alert("اختر الصف");
                if (!lessonName) return alert("اختر الحصة");
                const lessonIdx = lessonOptions.indexOf(lessonName);
                addLessonToDay(day, teacherName, className, lessonIdx);
                alert(`✅ تمت إضافة الحصة ${lessonName} للمعلم ${teacherName} (${className})`);
                refreshDayPane(day);
            });
        }
        // أزرار حذف الحصص (delegation لأنها تظهر ديناميكياً)
        const container = document.querySelector(`#pane-${day}`);
        if (container) {
            container.querySelectorAll('.delete-lesson-btn').forEach(btn => {
                btn.removeEventListener('click', window.tempLessonHandler);
                const handler = (e) => {
                    const dayAttr = btn.getAttribute('data-day');
                    const lessonIdx = parseInt(btn.getAttribute('data-lessonidx'));
                    const entryIdx = parseInt(btn.getAttribute('data-entryidx'));
                    if (confirm("هل تريد حذف هذه الحصة؟")) {
                        deleteSingleLesson(dayAttr, lessonIdx, entryIdx);
                        refreshDayPane(dayAttr);
                    }
                };
                btn.addEventListener('click', handler);
                btn.tempLessonHandler = handler;
            });
            // حذف المعلمين
            container.querySelectorAll('.delete-teacher-btn').forEach(btn => {
                btn.removeEventListener('click', window.tempTeacherHandler);
                const teacherHandler = (e) => {
                    const dayAttr = btn.getAttribute('data-day');
                    const teacher = btn.getAttribute('data-teacher');
                    if (confirm(`⚠️ سيتم حذف المعلم "${teacher}" وجميع حصصه. هل أنت متأكد؟`)) {
                        deleteTeacherCompletely(dayAttr, teacher);
                        refreshDayPane(dayAttr);
                    }
                };
                btn.addEventListener('click', teacherHandler);
                btn.tempTeacherHandler = teacherHandler;
            });
        }
    }
    
    // ربط البحث وعرض جدول جميل
    function attachSearchEvents() {
        const searchBtn = document.getElementById("performSearchBtn");
        if (searchBtn) {
            searchBtn.addEventListener("click", () => {
                const selectedDay = document.getElementById("searchDaySelect").value;
                const selectedLesson = document.getElementById("searchLessonSelect").value;
                const resultArea = document.getElementById("searchResultArea");
                if (!selectedDay || !selectedLesson) {
                    resultArea.innerHTML = `<div style="background:#ffe1cc; padding:20px; border-radius:28px;">⚠️ يرجى اختيار اليوم والحصة معاً.</div>`;
                    return;
                }
                const lessonIdx = lessonOptions.indexOf(selectedLesson);
                ensureDayStructure(selectedDay);
                const lessonsData = daySchedule[selectedDay][lessonIdx] || [];
                if (lessonsData.length === 0) {
                    resultArea.innerHTML = `<div style="background:#f6e4d6; padding:20px; border-radius:28px;">📭 لا يوجد معلمون يدرّسون الحصة ${selectedLesson} يوم ${selectedDay}.</div>`;
                    return;
                }
                // بناء جدول أنيق
                let tableHtml = `<div style="margin-bottom: 1rem; font-size:1.2rem; font-weight:bold; background:#e2a76f20; padding:8px 16px; border-radius:40px; display:inline-block;">📅 اليوم: ${selectedDay} | ⏰ الحصة: ${selectedLesson}</div>
                                <table class="result-table">
                                    <thead><tr><th>👨‍🏫 المعلم</th><th>🏫 الصف</th></tr></thead>
                                    <tbody>`;
                lessonsData.forEach(entry => {
                    tableHtml += `<tr><td>${escapeHtml(entry.teacherName)}</td><td>${escapeHtml(entry.className)}</td></tr>`;
                });
                tableHtml += `</tbody></table>`;
                resultArea.innerHTML = tableHtml;
            });
        }
    }
    
    // بناء كل التبويبات
    function renderAllPanes() {
        const container = document.getElementById("panesContainer");
        if (!container) return;
        let panesHtml = "";
        daysList.forEach(day => {
            panesHtml += `<div class="tab-pane" id="pane-${day}" data-day="${day}">${generateDayContent(day)}</div>`;
        });
        panesHtml += `<div class="tab-pane" id="pane-search" data-day="search">${generateSearchContent()}</div>`;
        container.innerHTML = panesHtml;
        daysList.forEach(day => attachDayEvents(day));
        attachSearchEvents();
        showTabPane(currentActiveDay);
    }
    
    // إظهار التبويب المناسب
    let currentActiveDay = "الأحد";
    function showTabPane(dayOrSearch) {
        const allPanes = document.querySelectorAll('.tab-pane');
        allPanes.forEach(pane => pane.classList.remove('active'));
        if (dayOrSearch === "search") {
            const searchPane = document.getElementById("pane-search");
            if (searchPane) searchPane.classList.add("active");
        } else {
            const target = document.getElementById(`pane-${dayOrSearch}`);
            if (target) target.classList.add("active");
        }
        const btns = document.querySelectorAll('.tab-btn');
        btns.forEach(btn => {
            btn.classList.remove('active');
            const btnDay = btn.getAttribute('data-day');
            if ((btnDay === dayOrSearch) || (dayOrSearch === "search" && btnDay === "search")) btn.classList.add('active');
        });
    }
    
    // التنقل بين التبويبات
    function initTabsNavigation() {
        const btns = document.querySelectorAll('.tab-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                const val = btn.getAttribute('data-day');
                if (val === "search") {
                    currentActiveDay = "search";
                    showTabPane("search");
                    attachSearchEvents();
                } else {
                    currentActiveDay = val;
                    showTabPane(val);
                    refreshDayPane(val);
                }
            });
        });
    }
    
    // بيانات تجريبية (لتوضيح الميزات) ولكن بدون تداخل مع الحفظ التلقائي إن وجدت بيانات قديمة
    function initDemoIfEmpty() {
        let anyData = false;
        daysList.forEach(day => { if ((dayTeachers[day] && dayTeachers[day].length) || (daySchedule[day] && daySchedule[day].some(arr => arr.length))) anyData = true; });
        if (!anyData) {
            addTeacherToDay("الأحد", "أحمد السيد");
            addTeacherToDay("الأحد", "نورة الهاشمي");
            addLessonToDay("الأحد", "أحمد السيد", "أول١", 0);
            addLessonToDay("الأحد", "نورة الهاشمي", "ثاني٢", 4);
            addTeacherToDay("الإثنين", "خالد المنصور");
            addLessonToDay("الإثنين", "خالد المنصور", "ثالث٣", 2);
            addTeacherToDay("الثلاثاء", "فاطمة الزهراء");
            addLessonToDay("الثلاثاء", "فاطمة الزهراء", "أول٢", 5);
            addTeacherToDay("الأربعاء", "عمر الفاروق");
            addLessonToDay("الأربعاء", "عمر الفاروق", "ثاني١", 1);
            addTeacherToDay("الخميس", "ليلى الشامسي");
            addLessonToDay("الخميس", "ليلى الشامسي", "ثالث٢", 3);
        }
    }
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    // بدء التشغيل
    loadFromStorage();
    daysList.forEach(day => ensureDayStructure(day));
    initDemoIfEmpty();
    renderAllPanes();
    initTabsNavigation();
    showTabPane("الأحد");
</script>
